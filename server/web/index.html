<!DOCTYPE html>
<html lang="zh-CN" data-theme="business-light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCP 文件传输 · Web 控制台</title>
  <style>
    /* ===== 简约商务主题（统一 Indigo 色系） ===== */
    [data-theme="business-light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: #eef2ff;
      --success: #059669;
      --success-soft: #ecfdf5;
      --warn: #d97706;
      --warn-soft: #fffbeb;
      --danger: #dc2626;
      --nav-bg: #ffffff;
      --shadow: 0 1px 3px rgba(15,23,42,.06), 0 8px 24px rgba(15,23,42,.04);
      --row-hover: #f8fafc;
      --row-selected: #eef2ff;
    }
    [data-theme="business-dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #334155;
      --border-strong: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --primary: #818cf8;
      --primary-hover: #a5b4fc;
      --primary-soft: rgba(99,102,241,.15);
      --success: #34d399;
      --success-soft: rgba(16,185,129,.12);
      --warn: #fbbf24;
      --warn-soft: rgba(251,191,36,.12);
      --danger: #f87171;
      --nav-bg: #1e293b;
      --shadow: 0 4px 24px rgba(0,0,0,.25);
      --row-hover: rgba(255,255,255,.04);
      --row-selected: rgba(99,102,241,.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* 顶部导航 */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px;
      background: var(--nav-bg); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
    }
    .brand h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
    .brand p { font-size: .75rem; color: var(--muted); margin-top: 1px; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    /* 太阳 / 月亮 滑动主题切换（高对比、胶囊滑块） */
    .theme-switch {
      padding: 0; border: none; background: transparent; cursor: pointer;
      flex-shrink: 0;
    }
    .theme-switch:focus-visible .theme-switch-track {
      outline: 2px solid var(--primary);
      outline-offset: 3px;
    }
    .theme-switch-track {
      position: relative;
      display: flex; align-items: center; justify-content: space-between;
      width: 82px; height: 40px; padding: 0 9px;
      border-radius: 999px;
      /* 左暖黄 → 右靛蓝渐变，浅色/深色一目了然 */
      background: linear-gradient(135deg, #fcd34d 0%, #fde68a 28%, #c7d2fe 52%, #6366f1 78%, #4338ca 100%);
      border: 2px solid #94a3b8;
      box-shadow:
        inset 0 2px 6px rgba(15, 23, 42, .18),
        0 2px 10px rgba(15, 23, 42, .12);
      transition: border-color .2s, box-shadow .2s;
    }
    .theme-switch:hover .theme-switch-track {
      border-color: var(--primary);
      box-shadow:
        inset 0 2px 6px rgba(15, 23, 42, .18),
        0 4px 14px rgba(79, 70, 229, .28);
    }
    [data-theme="business-dark"] .theme-switch-track {
      border-color: #64748b;
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, .35),
        0 2px 12px rgba(0, 0, 0, .4);
    }
    .theme-switch-icon {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; pointer-events: none;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, .25));
    }
    .theme-switch-icon svg {
      width: 18px; height: 18px;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .theme-switch-icon.sun svg {
      stroke: #b45309; stroke-width: 2; fill: #fbbf24;
    }
    .theme-switch-icon.moon svg {
      stroke: #e0e7ff; stroke-width: 2; fill: #c7d2fe;
    }
    .theme-switch-thumb {
      position: absolute; top: 4px; left: 4px;
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
      box-shadow:
        0 2px 8px rgba(15, 23, 42, .28),
        0 0 0 1px rgba(15, 23, 42, .08);
      transition: transform .32s cubic-bezier(.4, 0, .2, 1);
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    [data-theme="business-dark"] .theme-switch-thumb {
      transform: translateX(42px);
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
    }
    .theme-switch-thumb svg {
      width: 16px; height: 16px;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .theme-switch-thumb .thumb-sun {
      stroke: #d97706; stroke-width: 2.2; fill: #f59e0b;
    }
    .theme-switch-thumb .thumb-moon {
      display: none;
      stroke: #4338ca; stroke-width: 2.2; fill: #6366f1;
    }
    [data-theme="business-dark"] .theme-switch-thumb .thumb-sun { display: none; }
    [data-theme="business-dark"] .theme-switch-thumb .thumb-moon { display: block; }
    /* 未选中侧图标略微变淡，突出滑块方向 */
    [data-theme="business-light"] .theme-switch-icon.moon { opacity: .55; }
    [data-theme="business-dark"] .theme-switch-icon.sun { opacity: .55; }
    [data-theme="business-light"] .theme-switch-icon.sun,
    [data-theme="business-dark"] .theme-switch-icon.moon { opacity: 1; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px; font-size: .8rem; font-weight: 600;
      background: var(--success-soft); color: var(--success); border: 1px solid transparent;
    }
    .status-pill::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--success);
    }
    .status-pill.offline { background: var(--warn-soft); color: var(--warn); }
    .status-pill.offline::before { background: var(--warn); }

    /* 主布局：左栏 + 右栏 */
    .layout {
      display: grid; grid-template-columns: 300px 1fr;
      gap: 0; max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 60px);
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }

    .sidebar {
      padding: 20px; border-right: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column; gap: 16px;
    }
    .panel {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .panel-title {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 14px;
    }
    .panel h2 { font-size: .95rem; font-weight: 600; margin-bottom: 14px; color: var(--text); }

    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .field { margin-bottom: 12px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: .9rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    /* 自定义文件选择 */
    .file-picker {
      border: 1.5px dashed var(--border-strong); border-radius: 10px;
      padding: 20px 14px; text-align: center; cursor: pointer;
      background: var(--surface); transition: border-color .15s, background .15s;
    }
    .file-picker:hover { border-color: var(--primary); background: var(--primary-soft); }
    .file-picker-icon { font-size: 1.6rem; margin-bottom: 6px; opacity: .7; }
    .file-picker-text { font-size: .85rem; color: var(--muted); word-break: break-all; }
    .file-picker-text strong { color: var(--primary); font-weight: 600; }
    #fileInput { display: none; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    button {
      border: none; border-radius: 8px; padding: 9px 16px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    button:active { transform: scale(.98); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(79,70,229,.25); }
    .btn-outline {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); 
    }
    .btn-outline:hover { border-color: var(--border-strong); color: var(--text); }
    .btn-block { width: 100%; }

    .auth-badge {
      margin-top: 12px; padding: 8px 12px; border-radius: 8px;
      font-size: .82rem; font-weight: 500; text-align: center;
      background: var(--warn-soft); color: var(--warn);
    }
    .auth-badge.ok { background: var(--success-soft); color: var(--success); }
    .auth-badge.err { background: rgba(220,38,38,.08); color: var(--danger); }

    .progress-wrap { margin-top: 14px; }
    .progress-bar {
      height: 8px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .progress-bar > div {
      height: 100%; width: 0%; background: var(--primary);
      border-radius: 999px; transition: width .25s ease;
    }
    .progress-text { font-size: .78rem; color: var(--muted); margin-top: 6px; }

    /* 右侧主区域 */
    .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
    .main-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .main-header h2 { font-size: 1.1rem; font-weight: 700; }
    .main-header p { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    .file-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column; min-height: 320px;
    }
    .file-table-wrap { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead { position: sticky; top: 0; z-index: 1; }
    th {
      text-align: left; padding: 12px 16px; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr { cursor: pointer; transition: background .12s; }
    tbody tr:hover { background: var(--row-hover); }
    tbody tr.selected { background: var(--row-selected); }
    .file-name { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .file-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; background: var(--primary-soft); color: var(--primary);
    }
    .size-col { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .btn-sm {
      padding: 6px 12px; font-size: .78rem; border-radius: 6px;
      background: var(--primary-soft); color: var(--primary);
    }
    .btn-sm:hover { background: var(--primary); color: #fff; }
    .btn-sm.btn-danger { background: rgba(220,38,38,.1); color: var(--danger); margin-left: 6px; }
    .btn-sm.btn-danger:hover { background: var(--danger); color: #fff; }
    .action-btns { display: flex; justify-content: flex-end; gap: 4px; flex-wrap: nowrap; }

    /* 空状态 */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 24px; text-align: center; color: var(--muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .5; }
    .empty-state h3 { font-size: .95rem; color: var(--text); margin-bottom: 6px; font-weight: 600; }
    .empty-state p { font-size: .82rem; max-width: 260px; }

    /* 日志区（可折叠 + 可拖拽调整高度） */
    .log-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; flex-shrink: 0;
    }
    .log-card.collapsed .log-resize-handle { display: none; }
    .log-resize-handle {
      height: 10px; cursor: ns-resize; flex-shrink: 0;
      background: var(--surface-2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .log-resize-handle:hover, .log-resize-handle.dragging { background: var(--primary-soft); }
    .log-resize-handle .grip {
      width: 40px; height: 4px; border-radius: 999px;
      background: var(--border-strong); pointer-events: none;
      box-shadow: 0 -3px 0 var(--border-strong), 0 3px 0 var(--border-strong);
    }
    .log-resize-handle:hover .grip, .log-resize-handle.dragging .grip {
      background: var(--primary); box-shadow: 0 -3px 0 var(--primary), 0 3px 0 var(--primary);
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .log-header span { font-size: .82rem; font-weight: 600; color: var(--muted); }
    .log-header .hint { font-size: .72rem; font-weight: 400; color: var(--border-strong); margin-left: 8px; }
    .log-body {
      height: 200px; min-height: 80px; max-height: 75vh;
      overflow-y: auto; padding: 10px 16px;
      font-size: .8rem; color: var(--muted);
    }
    .log-body.collapsed { display: none; }
    .log-item { padding: 4px 0; display: flex; gap: 8px; align-items: flex-start; }
    .log-item .time { color: var(--border-strong); flex-shrink: 0; font-variant-numeric: tabular-nums; min-width: 62px; }
    .log-item .tag {
      flex-shrink: 0; font-size: .68rem; font-weight: 700; padding: 1px 6px;
      border-radius: 4px; line-height: 1.4;
    }
    .log-item.success .msg { color: var(--success); }
    .log-item.error .msg { color: var(--danger); }
    .log-item.theory .tag { background: var(--primary-soft); color: var(--primary); }
    .log-item.theory .msg { color: var(--text); line-height: 1.45; }
    .log-item.action .tag { background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
    .log-item.action .msg { color: var(--muted); }

    /* Toast 通知 */
    #toastBox {
      position: fixed; top: 72px; right: 20px; z-index: 999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 12px 16px; border-radius: 10px; font-size: .85rem; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow); pointer-events: auto;
      animation: slideIn .25s ease;
      max-width: 320px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.info { border-left: 3px solid var(--primary); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="topbar">
    <div class="brand">
      <div class="brand-icon">TF</div>
      <div>
        <h1>TCP 文件传输系统</h1>
        <p>Web 控制台 · 端口 8082</p>
      </div>
    </div>
    <div class="topbar-actions">
      <button type="button" class="theme-switch" id="themeSwitch"
        onclick="toggleTheme()" role="switch" aria-checked="false"
        aria-label="切换浅色/深色模式" title="点击切换浅色 / 深色">
        <span class="theme-switch-track">
          <span class="theme-switch-icon sun" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
              <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="5" y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
              <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
            </svg>
          </span>
          <span class="theme-switch-icon moon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          <span class="theme-switch-thumb" aria-hidden="true">
            <svg class="thumb-sun" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
              <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="5" y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
              <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="thumb-moon" viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
        </span>
      </button>
      <span class="status-pill" id="serverBadge">服务器在线</span>
    </div>
  </nav>

  <div class="layout">
    <!-- 左侧：登录 + 上传 -->
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">Account</div>
        <h2>用户登录</h2>
        <div class="field">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="admin123" autocomplete="current-password" />
        </div>
        <div class="btn-row">
          <button class="btn-primary" style="flex:1" onclick="doLogin()">登录验证</button>
          <button class="btn-outline" onclick="doLogout()">退出</button>
        </div>
        <div class="auth-badge" id="authStatus">未登录</div>
      </div>

      <div class="panel">
        <div class="panel-title">Upload</div>
        <h2>上传文件</h2>
        <input type="file" id="fileInput" onchange="onFileChosen(this)" />
        <div class="file-picker" id="filePicker" onclick="document.getElementById('fileInput').click()">
          <div class="file-picker-icon">📁</div>
          <div class="file-picker-text" id="fileLabel">
            点击 <strong>选择文件</strong><br />支持 txt / 图片 / 视频等
          </div>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button class="btn-primary btn-block" onclick="doUpload()">上传到服务器</button>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div id="progressFill"></div></div>
          <div class="progress-text" id="progressText">等待上传</div>
        </div>
      </div>
    </aside>

    <!-- 右侧：文件列表 + 日志 -->
    <main class="main">
      <div class="main-header">
        <div>
          <h2>服务器文件</h2>
          <p>登录后可查看、下载 storage 目录中的文件</p>
        </div>
        <button class="btn-outline" onclick="loadFiles()">↻ 刷新列表</button>
      </div>

      <div class="file-card">
        <div class="file-table-wrap" id="fileTableWrap">
          <table>
            <thead>
              <tr>
                <th>文件名</th>
                <th style="width:110px">大小</th>
                <th style="width:140px;text-align:right">操作</th>
              </tr>
            </thead>
            <tbody id="fileTable"></tbody>
          </table>
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📂</div>
            <h3>暂无文件</h3>
            <p>请先登录账号，然后上传文件或刷新列表</p>
          </div>
        </div>
      </div>

      <div class="log-card" id="logCard">
        <div class="log-resize-handle" id="logResizeHandle" title="拖动调整日志区域高度">
          <span class="grip"></span>
        </div>
        <div class="log-header" onclick="toggleLog()">
          <span>运行日志 · 实验理论说明<span class="hint">（拖动上边缘 ↕ 调整大小）</span></span>
          <span id="logToggle">▼</span>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>
    </main>
  </div>

  <div id="toastBox"></div>

  <script>
    let loggedIn = false;
    let currentUser = "";
    let selectedFile = "";
    let logExpanded = true;

    function applyTheme(name) {
      document.documentElement.setAttribute("data-theme", name);
      localStorage.setItem("ui-theme", name);
      var sw = document.getElementById("themeSwitch");
      if (sw) sw.setAttribute("aria-checked", name === "business-dark" ? "true" : "false");
    }

    function toggleTheme() {
      var current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "business-dark" ? "business-light" : "business-dark");
    }

    (function initTheme() {
      const saved = localStorage.getItem("ui-theme");
      applyTheme(saved === "business-dark" ? "business-dark" : "business-light");
      renderEmptyState("请先登录账号，然后上传文件或刷新列表");
    })();

    function toast(msg, type = "info") {
      const box = document.getElementById("toastBox");
      const el = document.createElement("div");
      el.className = "toast " + type;
      el.textContent = msg;
      box.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    function log(msg, type = "") {
      const body = document.getElementById("logBody");
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      const item = document.createElement("div");
      item.className = "log-item action" + (type ? " " + type : "");
      const tag = type === "success" ? "成功" : type === "error" ? "错误" : "操作";
      item.innerHTML = `<span class="time">${t}</span><span class="tag">${tag}</span><span class="msg">${escHtml(msg)}</span>`;
      body.appendChild(item);
      body.scrollTop = body.scrollHeight;
    }

    /** 写入实验理论说明（对应《基于 Socket 的 TCP 应用》要点） */
    function logTheory(msg) {
      const body = document.getElementById("logBody");
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      const item = document.createElement("div");
      item.className = "log-item theory";
      item.innerHTML = `<span class="time">${t}</span><span class="tag">理论</span><span class="msg">${escHtml(msg)}</span>`;
      body.appendChild(item);
      body.scrollTop = body.scrollHeight;
    }

    /** 页面加载时输出 TCP/Socket 核心理论摘要 */
    function bootTheoryLogs() {
      const lines = [
        "【TCP 基础】TCP 是面向连接、可靠的字节流协议；应用层通过 Socket API（socket/bind/listen/accept/connect/send/recv）实现端到端通信。",
        "【公网与并发】服务端绑定 0.0.0.0:8082 监听全网卡；每 accept 一个客户端即创建 threading 线程，支持多用户同时登录与传输。",
        "【粘包问题】TCP 无消息边界，连续 send 可能合并或拆分；本系统用固定 10 字节报文头（Magic+Version+Cmd+PayloadLen）+ 精确长度读满解决粘包/半包。",
        "【报文头格式】Magic(4)=FTCP | Version(1) | Command(1) | PayloadLen(4)；先 recv_exact(10) 再按 PayloadLen 读取 Payload。",
        "【文件元数据】Payload 含 filename_len(4)+file_size(8)+filename(UTF-8)；其后紧跟 file_size 字节的二进制文件流。",
        "【分块缓存】发送端循环 read(4096) 写入 Buffer 再 sendall；接收端循环 recv(4096) 并通过文件指针实时 write，支持 txt/图片/视频等。",
        "【身份验证】上传/下载前须登录；客户端提交用户名密码，服务端读取 users.json 比对，并分别返回「用户名错误」或「密码错误」。",
        "【上传确认】FTCP 客户端上传完成后，服务端返回 CMD_UPLOAD_ACK 帧，客户端收到 ACK 才判定上传成功。",
        "【Web 与 FTCP】本 Web 页走 HTTP 协议便于浏览器访问；Python 桌面客户端走 FTCP 自定义协议；二者共用 storage 目录。",
      ];
      lines.forEach((line, i) => setTimeout(() => logTheory(line), i * 120));
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function toggleLog() {
      logExpanded = !logExpanded;
      document.getElementById("logBody").classList.toggle("collapsed", !logExpanded);
      document.getElementById("logCard").classList.toggle("collapsed", !logExpanded);
      document.getElementById("logToggle").textContent = logExpanded ? "▼" : "▶";
    }

    /** 初始化日志面板拖拽调整高度（类似终端 split pane） */
    function initLogResize() {
      const body = document.getElementById("logBody");
      const handle = document.getElementById("logResizeHandle");
      const LOG_H_MIN = 80;
      const logHMax = () => Math.min(Math.floor(window.innerHeight * 0.75), 640);
      const saved = parseInt(localStorage.getItem("log-panel-height") || "200", 10);
      body.style.height = Math.min(logHMax(), Math.max(LOG_H_MIN, saved)) + "px";

      let dragging = false;
      let startY = 0;
      let startH = 0;

      handle.addEventListener("mousedown", (e) => {
        if (!logExpanded) return;
        dragging = true;
        startY = e.clientY;
        startH = body.offsetHeight;
        handle.classList.add("dragging");
        document.body.style.cursor = "ns-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
        e.stopPropagation();
      });

      document.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const next = Math.min(logHMax(), Math.max(LOG_H_MIN, startH + (startY - e.clientY)));
        body.style.height = next + "px";
      });

      document.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove("dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        localStorage.setItem("log-panel-height", String(body.offsetHeight));
      });
    }

    function onFileChosen(input) {
      const label = document.getElementById("fileLabel");
      if (input.files.length) {
        const f = input.files[0];
        label.innerHTML = `<strong>${escHtml(f.name)}</strong><br>${formatSize(f.size)}`;
      } else {
        label.innerHTML = '点击 <strong>选择文件</strong><br />支持 txt / 图片 / 视频等';
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1048576).toFixed(2) + " MB";
    }

    function fileIcon(name) {
      const ext = (name.split(".").pop() || "").toLowerCase();
      if (["png","jpg","jpeg","gif","webp","svg"].includes(ext)) return "🖼";
      if (["mp4","avi","mkv","mov","webm"].includes(ext)) return "🎬";
      if (["mp3","wav","flac"].includes(ext)) return "🎵";
      if (["zip","rar","7z","tar","gz"].includes(ext)) return "📦";
      if (["pdf"].includes(ext)) return "📕";
      if (["txt","md","log"].includes(ext)) return "📄";
      return "📎";
    }

    function setProgress(p, text) {
      document.getElementById("progressFill").style.width = Math.min(100, p) + "%";
      document.getElementById("progressText").textContent = text || (p > 0 ? `上传进度 ${p.toFixed(1)}%` : "等待上传");
    }

    function setAuth(ok, msg) {
      loggedIn = ok;
      const el = document.getElementById("authStatus");
      if (ok) {
        el.textContent = "● 已登录 · " + currentUser;
        el.className = "auth-badge ok";
      } else {
        el.textContent = msg && msg !== "未登录" ? msg : "未登录";
        el.className = "auth-badge" + (msg && msg !== "未登录" ? " err" : "");
      }
    }

    function renderEmptyState(msg) {
      document.getElementById("fileTable").innerHTML = "";
      const es = document.getElementById("emptyState");
      es.style.display = "flex";
      es.querySelector("p").textContent = msg;
    }

    function hideEmptyState() {
      document.getElementById("emptyState").style.display = "none";
    }

    // 与 server/database.py PASSWORD_SALT 保持一致，登录前本地哈希，网络上不传输明文
    const PASSWORD_SALT = "FTCP_FILE_TRANSFER_SALT_2026";

    async function hashPassword(password, username) {
      const raw = PASSWORD_SALT + ":" + username + ":" + password;
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
      return Array.from(new Uint8Array(buf)).map(function (b) {
        return b.toString(16).padStart(2, "0");
      }).join("");
    }

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) { toast("请输入用户名和密码", "error"); return; }
      try {
        // 浏览器本地 SHA-256 哈希后再 POST，Wireshark 抓包只见摘要不见明文
        const passwordHash = await hashPassword(password, username);
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password: passwordHash }),
          credentials: "same-origin",
        });
        const data = await res.json();
        if (!data.ok) {
          toast(data.message, "error");
          setAuth(false, data.message);
          log("登录失败：" + data.message, "error");
          logTheory("【验证机制】登录失败时服务端返回明确状态码：用户名不存在→「用户名错误」；密码不匹配→「密码错误」，便于实验报告分析。");
          return;
        }
        currentUser = username;
        setAuth(true, data.message);
        toast("登录成功", "success");
        log("登录成功：" + username, "success");
        logTheory("【传输安全】Web 端登录前在浏览器本地完成 SHA-256 加盐哈希，HTTP 请求体中 password 字段为 64 位摘要，抓包无法还原明文。");
        logTheory("【权限控制】authenticated=True 后才允许 LIST/UPLOAD/DOWNLOAD；未登录发起文件操作将被拒绝并返回 ERROR 帧。");
        loadFiles();
      } catch (e) {
        toast("连接失败，请确认服务器已启动", "error");
        log("连接错误：" + e, "error");
      }
    }

    async function doLogout() {
      await fetch("/api/logout", { method: "POST", credentials: "same-origin" });
      currentUser = "";
      setAuth(false, "未登录");
      toast("已退出登录", "info");
      log("已退出登录");
      renderEmptyState("请先登录账号，然后上传文件或刷新列表");
    }

    async function loadFiles() {
      if (!loggedIn) { toast("请先登录", "error"); return; }
      try {
        const res = await fetch("/api/files", { credentials: "same-origin" });
        const data = await res.json();
        if (!data.ok) { toast(data.message, "error"); return; }
        const tbody = document.getElementById("fileTable");
        if (!data.files.length) {
          renderEmptyState("暂无文件，请从左侧上传");
          return;
        }
        hideEmptyState();
        tbody.innerHTML = data.files.map(f => {
          const safe = f.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
          return `<tr onclick="selectRow(this,'${safe}')">
            <td><div class="file-name"><span class="file-icon">${fileIcon(f.name)}</span>${escHtml(f.name)}</div></td>
            <td class="size-col">${formatSize(f.size)}</td>
            <td><div class="action-btns">
              <button class="btn-sm" onclick="event.stopPropagation();downloadFile('${safe}')">下载</button>
              <button class="btn-sm btn-danger" onclick="event.stopPropagation();deleteFile('${safe}')">删除</button>
            </div></td>
          </tr>`;
        }).join("");
        log("已加载 " + data.files.length + " 个文件");
        logTheory("【列表命令】FTCP 客户端发送 CMD_LIST（无 Payload）→ 服务端扫描 storage/ → 返回 CMD_LIST_RESP（文件数+各文件名与大小）。");
      } catch (e) {
        toast("获取列表失败", "error");
        log("列表错误：" + e, "error");
      }
    }

    function selectRow(row, name) {
      document.querySelectorAll("#fileTable tr").forEach(r => r.classList.remove("selected"));
      row.classList.add("selected");
      selectedFile = name;
    }

    function downloadFile(name) {
      if (!loggedIn) { toast("请先登录", "error"); return; }
      const n = name || selectedFile;
      if (!n) { toast("请选择要下载的文件", "error"); return; }
      window.location.href = "/api/download?name=" + encodeURIComponent(n);
      toast("开始下载：" + n, "info");
      log("开始下载：" + n);
      logTheory("【下载流程】客户端发 CMD_DOWNLOAD 含文件名 → 服务端发 DOWNLOAD 元数据帧 → 循环 read(4096)+sendall 发送文件体；客户端 recv(4096)+write 落盘。");
    }

    async function deleteFile(name) {
      if (!loggedIn) { toast("请先登录", "error"); return; }
      const n = name || selectedFile;
      if (!n) { toast("请选择要删除的文件", "error"); return; }
      if (!confirm(`确定删除服务器上的文件？\n\n${n}\n\n此操作不可恢复。`)) return;
      try {
        const res = await fetch("/api/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: n }),
          credentials: "same-origin",
        });
        const data = await res.json();
        if (!data.ok) {
          const hint = data.message === "接口不存在"
            ? "（服务端可能未重启，请在服务器执行：cd server && python3 server.py）"
            : "";
          toast(data.message + hint, "error");
          log("删除失败：" + data.message + hint, "error");
          return;
        }
        toast("已删除：" + n, "success");
        log("删除成功：" + n, "success");
        logTheory("【删除命令】FTCP 客户端发送 CMD_DELETE（含文件名）→ 服务端 os.remove 删除 storage/ 中文件 → 返回 DELETE_RESP。");
        if (selectedFile === n) selectedFile = "";
        loadFiles();
      } catch (e) {
        toast("删除请求失败", "error");
        log("删除错误：" + e, "error");
      }
    }

    function doUpload() {
      if (!loggedIn) { toast("请先登录后再上传", "error"); return; }
      const input = document.getElementById("fileInput");
      if (!input.files.length) { toast("请先选择文件", "error"); return; }
      const file = input.files[0];
      logTheory("【上传流程】先发 CMD_UPLOAD 元数据帧（文件名+总大小）→ 再分块发送文件体；服务端 recv_exact 按 file_size 收满后写 storage/ 并回 ACK。");
      logTheory("【Buffer 原理】CHUNK_SIZE=4096：每次从磁盘读/写 4096 字节到用户态缓存，再与 Socket 发送/接收缓存交换，体现流式 I/O 与内存换效率思想。");
      const form = new FormData();
      form.append("file", file);
      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/upload");
      xhr.withCredentials = true;
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const p = (e.loaded / e.total) * 100;
          setProgress(p, `${file.name} · ${p.toFixed(1)}% · ${formatSize(e.loaded)} / ${formatSize(e.total)}`);
        }
      };
      xhr.onload = () => {
        try {
          const data = JSON.parse(xhr.responseText);
          if (!data.ok) {
            toast(data.message, "error");
            log("上传失败：" + data.message, "error");
            setProgress(0, "上传失败");
            return;
          }
          setProgress(100, "上传完成");
          toast("上传成功：" + data.name, "success");
          log(`上传成功：${data.name}（${formatSize(data.size)}）`, "success");
          logTheory("【Web 上传】浏览器经 HTTP multipart 上传至同一 storage/；FTCP 客户端则走 Socket 分块流并等待 CMD_UPLOAD_ACK 确认帧。");
          input.value = "";
          onFileChosen(input);
          loadFiles();
        } catch (e) {
          toast("上传响应异常", "error");
        }
      };
      xhr.onerror = () => { toast("上传失败", "error"); log("上传网络错误", "error"); };
      xhr.send(form);
    }

    async function checkServerVersion() {
      try {
        const res = await fetch("/api/version");
        const data = await res.json();
        if (!data.ok || !data.features || !data.features.includes("delete")) {
          log("警告：当前服务端版本较旧，不支持删除接口，请重启 server.py", "error");
          toast("服务端需重启以启用删除功能", "error");
        }
      } catch (e) {
        /* 旧版服务端无 /api/version，忽略 */
      }
    }

    log("Web 控制台已就绪，请先在左侧登录。");
    initLogResize();
    checkServerVersion();
    bootTheoryLogs();
  </script>
</body>
</html>
